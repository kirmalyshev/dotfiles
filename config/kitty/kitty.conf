# Kitty terminal configuration
# Ported from Ghostty settings

# macOS
macos_option_as_alt yes

# Font settings
font_family      Menlo
font_size        12.0
bold_font        auto
italic_font      auto
bold_italic_font auto

# Mouse
mouse_map left click ungrabbed mouse_handle_click selection link prompt
mouse_map ctrl+left click ungrabbed mouse_handle_click link
touch_scroll_multiplier 2.0

# Cursor
cursor           #f81ce5
cursor_shape     block
cursor_blink_interval 0

# Colors
foreground       #ffffff
background       #000000
selection_foreground #ffffff
selection_background #f81ce5

# Color palette (0-15)
color0  #000000
color1  #c51e14
color2  #1dc121
color3  #c7c329
color4  #0a2fc4
color5  #c839c5
color6  #20c5c6
color7  #c7c7c7
color8  #686868
color9  #fd6f6b
color10 #67f86f
color11 #fffa72
color12 #6a76fb
color13 #fd7cfc
color14 #68fdfe
color15 #ffffff

# Dim inactive splits
inactive_text_alpha 0.6

# Window padding
window_padding_width 12 14

# Layout (splits enables horizontal/vertical splitting)
enabled_layouts splits,stack

# macOS: unmap conflicting defaults
map cmd+h
map cmd+d

# Keybindings
map alt+backspace send_text all \x1b\x7f

# Splits
map cmd+d launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current

# Navigate between splits
map cmd+left neighboring_window left
map cmd+right neighboring_window right
map cmd+up neighboring_window up
map cmd+down neighboring_window down

# Resize splits
map cmd+shift+left resize_window narrower 2
map cmd+shift+right resize_window wider 2
map cmd+shift+up resize_window taller 2
map cmd+shift+down resize_window shorter 2

# Tabs
map cmd+t new_tab_with_cwd
map cmd+w close_tab
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+shift+r set_tab_title
